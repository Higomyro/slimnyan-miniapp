<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Slimnyan MiniApp</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg: #09090e;
            --surface: rgba(26, 26, 46, 0.6);
            --surface-bright: #1f1f38;
            --accent: linear-gradient(135deg, #ff007a, #7928ca);
            --accent-solid: #ff007a;
            --green: #00ffaa;
            --text-main: #ffffff;
            --text-muted: #8f9cae;
            --glow: 0 0 20px rgba(255, 0, 122, 0.4);
        }

        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            background-image: radial-gradient(circle at 50% 10%, #1e1035 0%, var(--bg) 70%);
            color: var(--text-main);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .header {
            padding: 20px;
            text-align: center;
            backdrop-filter: blur(10px);
            background: rgba(9, 9, 14, 0.4);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .header h1 {
            font-size: 20px;
            font-weight: 800;
            background: linear-gradient(90deg, #fff, var(--text-muted));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.5px;
        }

        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .msg {
            max-width: 85%;
            padding: 12px 16px;
            border-radius: 20px;
            font-size: 15px;
            line-height: 1.4;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            animation: slideUp 0.2s ease-out;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .msg.user {
            background: var(--accent);
            color: #fff;
            align-self: flex-end;
            border-bottom-right-radius: 4px;
        }

        .msg.bot {
            background: var(--surface);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            align-self: flex-start;
            border-bottom-left-radius: 4px;
        }

        .quick-grid {
            padding: 12px 16px;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            background: rgba(9, 9, 14, 0.85);
            border-top: 1px solid rgba(255, 255, 255, 0.05);
        }

        .quick-grid button {
            background: var(--surface);
            border: 1px solid rgba(255, 255, 255, 0.05);
            color: #fff;
            padding: 12px 6px;
            border-radius: 14px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.15s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
        }

        .quick-grid button:active {
            transform: scale(0.95);
            background: var(--surface-bright);
            border-color: var(--accent-solid);
            box-shadow: var(--glow);
        }

        .quick-grid button span {
            color: var(--green);
            font-size: 11px;
            font-weight: 400;
        }

        .input-bar {
            padding: 10px 16px 24px;
            background: rgba(9, 9, 14, 0.85);
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .input-wrapper {
            flex: 1;
        }

        .input-bar input {
            width: 100%;
            padding: 14px 20px;
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            background: #121222;
            color: #fff;
            font-size: 15px;
            outline: none;
        }

        .input-bar input:focus {
            border-color: rgba(255, 0, 122, 0.5);
        }

        .send-btn {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            border: none;
            background: var(--accent);
            color: #fff;
            font-size: 18px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: var(--glow);
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>🌌 SLIMNYAN CONTROLLER</h1>
    </div>

    <div class="chat-container" id="chatContainer">
        <div class="msg bot">🤖 Терминал готов! Нажимай на плитки или вводи текст вручную. Ответ прилетит в чат бота.</div>
    </div>

    <div class="quick-grid">
        <button onclick="sendCmd('мяу')">🐾 Мяу <span>+баллы</span></button>
        <button onclick="sendCmd('баланс')">💗 Баланс <span>счёт</span></button>
        <button onclick="sendCmd('ты кто')">👤 Профиль <span>инфо</span></button>
        <button onclick="sendCmd('ракета 100')">🚀 Ракета <span>играть</span></button>
        <button onclick="sendCmd('рул кра 50')">🎡 Рулетка <span>риск</span></button>
        <button onclick="sendCmd('топмяу')">🏆 Топ <span>лидеры</span></button>
    </div>

    <div class="input-bar">
        <div class="input-wrapper">
            <input type="text" id="userInput" placeholder="Команда...">
        </div>
        <button class="send-btn" onclick="sendCmd()">⚡</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        const container = document.getElementById('chatContainer');
        const input = document.getElementById('userInput');

        function addMessage(text, type) {
            const div = document.createElement('div');
            div.className = 'msg ' + type;
            div.textContent = text;
            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
        }

        function sendCmd(explicitCmd) {
            const text = explicitCmd || input.value.trim();
            if (!text) return;

            addMessage(text, 'user');
            if (!explicitCmd) input.value = '';

            try {
                tg.sendData(text);
            } catch (e) {
                addMessage('❌ Ошибка отправки! Открывай MiniApp только через нижнюю кнопку "Панель управления", а не инлайн!', 'bot');
            }
        }

        input.addEventListener('keypress', e => { if (e.key === 'Enter') sendCmd(); });
        
        tg.MainButton.setText('Закрыть контроллер').show();
        tg.MainButton.onClick(() => tg.close());
    </script>
</body>
</html>
