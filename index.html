<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Nyanbot</title>

    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="style.css">
    <script src="config.js"></script>
    <script src="utils.js"></script>
    <script src="rocket.js"></script>
    <script src="main.js"></script>
</head>
<body>

<!-- ===== САЙДБАР ===== -->
<div class="sidebar">
    <div class="logo">🐾</div>

    <button class="nav-item active" onclick="switchTab('home')" title="Главная">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-4 0a1 1 0 01-1-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 01-1 1"/></svg>
    </button>

    <button class="nav-item" onclick="switchTab('chat')" title="Чат">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>
    </button>

    <button class="nav-item" onclick="switchTab('stats')" title="Статистика">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 21H3m0-6l6-6 4 4 7-7"/></svg>
    </button>

    <button class="nav-item" onclick="switchTab('shop')" title="Магазин">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 01-8 0"/></svg>
    </button>

    <button class="nav-item" onclick="switchTab('profile')" title="Профиль">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
    </button>

    <div class="nav-divider"></div>

    <div class="nav-bottom">
        <button class="nav-item" onclick="tg.close()" title="Закрыть">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6L6 18M6 6l12 12"/></svg>
        </button>
    </div>
</div>

<!-- ===== ОСНОВНОЙ КОНТЕНТ ===== -->
<div class="main">

    <!-- ХЕДЕР -->
    <div class="header">
        <div class="header-left">
            <h1>Nyanbot</h1>
            <span class="sub">/ ultra</span>
        </div>
        <div class="status">
            <span class="dot"></span>
            <span id="onlineStatus">online</span>
        </div>
    </div>

    <!-- ЧАТ -->
    <div class="chat" id="chat">
        <div class="msg bot">⚡ Подключение к серверу...</div>
    </div>

    <!-- НИЗ -->
    <div class="bottom">
        <div class="actions">
            <button onclick="sendMessage('мяу')">🐾 Мяу</button>
            <button onclick="sendMessage('баланс')">💰 Баланс</button>
            <button onclick="startRocket()">🚀 Ракета</button>
            <button class="primary" onclick="showStats()">📊 ТК</button>
        </div>

        <div class="input-row">
            <input type="text" id="cmdInput" placeholder="Введите команду..." autofocus>
            <button class="send-btn" onclick="sendMessage()">➜</button>
        </div>
    </div>

</div>

<!-- ===== ВЫДВИЖНОЙ СЛОЙ (СТАТИСТИКА) ===== -->
<div class="overlay" id="statsOverlay">
    <div class="overlay-content">
        <div class="overlay-title">📊 Статистика</div>
        <div id="statsImageContainer">
            <img id="statsImage" src="" alt="Статистика" style="display:none;">
            <div id="statsLoading" style="color:#666; padding:40px;">⏳ Генерация статистики...</div>
        </div>
        <div class="overlay-actions">
            <button class="primary" onclick="refreshStats()">🔄 Перезапустить</button>
            <button onclick="closeOverlay()">✕ Закрыть</button>
        </div>
    </div>
</div>

</body>
</html>
