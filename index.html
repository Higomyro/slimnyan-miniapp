<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Nyanbot Ultra UI</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">

<link rel="stylesheet" href="style.css">

<script src="config.js"></script>
<script src="rocket.js"></script>
<script src="main.js"></script>
</head>
<body>

<div class="grid"></div>
<div class="blur blur1"></div>
<div class="blur blur2"></div>
<div class="blur blur3"></div>

<div class="header">
    <div class="header-left">
        <div class="logo">🐾</div>
        <div class="logo-text">
            <h1>Nyanbot</h1>
            <p>ultra miniapp interface</p>
        </div>
    </div>
    <div class="online">💎 online</div>
</div>

<div class="chat" id="chat">
    <div class="msg bot">⚡ Подключение к серверу...</div>
</div>

<div class="bottom">
    <div class="actions">
        <button onclick="sendCmd('мяу')">🐾 Мяу</button>
        <button onclick="sendCmd('баланс')">💰 Баланс</button>
        <button onclick="startRocket()">🚀 Ракета</button>
    </div>

    <div class="input-wrap">
        <div class="input-row" id="rocketBetRow" style="display:none;">
            <input type="number" id="betInput" placeholder="Ставка..." value="100">
            <button class="send-btn" onclick="launchRocket()">🚀</button>
        </div>

        <div class="input-row">
            <input type="text" id="cmdInput" placeholder="Введите команду..." autofocus>
            <button class="send-btn" onclick="sendCmd()">➜</button>
        </div>
    </div>
</div>

</body>
</html>
