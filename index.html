<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Nyanbot Ultra UI</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">

<link rel="stylesheet" href="style.css">
<script src="config.js"></script>
<script src="utils.js"></script>
<script src="rocket.js"></script>
<script src="main.js"></script>

<script>
// ФИКС: принудительное объявление sendCmd глобально
window.sendCmd = function(explicitCmd) {
    const input = document.getElementById('cmdInput');
    const cmd = explicitCmd || (input ? input.value.trim() : '');
    if (!cmd) return;
    
    // Добавляем сообщение пользователя
    addMessage(cmd, 'user');
    if (!explicitCmd && input) input.value = '';
    
    // Отправляем на сервер
    sendToAPI({ command: cmd }, (err, data) => {
        if (err) {
            addMessage('❌ ' + err, 'bot');
            return;
        }
        let reply = data.reply || data.message;
        if (reply) {
            addMessage(reply, 'bot');
        } else if (data.status === 'success') {
            addMessage('✅ Выполнено', 'bot');
        } else {
            addMessage('❌ Неизвестная команда', 'bot');
        }
    });
};

// Дублируем на случай, если main.js не загрузился
document.addEventListener('DOMContentLoaded', function() {
    const input = document.getElementById('cmdInput');
    const btn = document.querySelector('.input-row .send-btn');
    if (btn) {
        btn.onclick = function() { window.sendCmd(); };
    }
    if (input) {
        input.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') window.sendCmd();
        });
    }
});
</script>

</head>
<body>

<div class="grid"></div>
<div class="blur blur1"></div>
<div class="blur blur2"></div>
<div class="blur blur3"></div>

<div class="header">
    <div class="header-left">
        <div class="logo">🐾</div>
        <div class="logo-text">
            <h1>Nyanbot</h1>
            <p>ultra miniapp interface</p>
        </div>
    </div>
    <div class="online" id="onlineStatus">🟢 online</div>
</div>

<div class="chat" id="chat">
    <div class="msg bot">⚡ Подключение к серверу...</div>
</div>

<div class="bottom">
    <div class="actions">
        <button onclick="window.sendCmd('мяу')">🐾 Мяу</button>
        <button onclick="window.sendCmd('баланс')">💰 Баланс</button>
        <button onclick="startRocket()">🚀 Ракета</button>
    </div>

    <div class="input-wrap">
        <div class="input-row" id="rocketBetRow" style="display:none;">
            <input type="number" id="betInput" placeholder="Ставка..." value="100">
            <button class="send-btn" onclick="launchRocket()">🚀</button>
        </div>

        <div class="input-row">
            <input type="text" id="cmdInput" placeholder="Введите команду..." autofocus>
            <button class="send-btn" id="sendButton">➜</button>
        </div>
    </div>
</div>

</body>
</html>
