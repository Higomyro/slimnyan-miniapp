<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nyanbot (miniapp)</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { 
            --bg: #09090e; 
            --panel: #131322; 
            --accent: #ff2a5f; 
            --green: #00ff88; 
            --blue: #00bfff;
            --text: #f0f0f5; 
        }
        * { margin:0; padding:0; box-sizing:border-box; font-family: -apple-system, sans-serif; }
        body { background:var(--bg); color:var(--text); height:100vh; display:flex; flex-direction:column; overflow:hidden; }
        .header { padding:18px; text-align:center; font-size:20px; font-weight:800; background:rgba(19,19,34,0.7); backdrop-filter:blur(10px); border-bottom:1px solid rgba(255,255,255,0.05); }
        .header span { color:var(--accent); }
        .chat { flex:1; overflow-y:auto; padding:20px; display:flex; flex-direction:column; gap:12px; }
        .msg { max-width:85%; padding:12px 16px; border-radius:18px; font-size:14.5px; line-height:1.45; animation:fadeIn 0.3s ease forwards; transform:translateY(10px); opacity:0; }
        @keyframes fadeIn { to { transform:translateY(0); opacity:1; } }
        .msg.user { background:linear-gradient(135deg,#254b7d,#1a3356); align-self:flex-end; }
        .msg.bot { background:var(--panel); align-self:flex-start; }
        .msg.rocket { background:linear-gradient(145deg,#1d0b2e,#11051c); border:1px solid var(--accent); box-shadow:0 0 15px rgba(255,42,95,0.4); align-self:center; text-align:center; width:90%; white-space:pre-line; }
        .bottom-panel { background:rgba(19,19,34,0.9); border-top:1px solid rgba(255,255,255,0.05); padding:12px; }
        .actions { display:flex; gap:8px; margin-bottom:12px; justify-content:center; }
        .actions button { background:var(--panel); color:var(--green); border:1px solid rgba(255,255,255,0.1); padding:12px 20px; border-radius:14px; font-size:14px; font-weight:600; cursor:pointer; }
        .actions button:active { transform:scale(0.95); }
        .input-row { display:flex; gap:8px; background:var(--panel); padding:6px 6px 6px 16px; border-radius:30px; border:1px solid rgba(255,255,255,0.05); align-items:center; }
        .input-row input { flex:1; border:none; background:transparent; color:#fff; font-size:15px; outline:none; }
        .input-row button { width:40px; height:40px; border-radius:50%; border:none; background:var(--accent); color:#fff; font-size:16px; cursor:pointer; }
        .cashout-btn { background:linear-gradient(90deg,#00ff88,#00e676); color:#000; padding:14px; border:none; border-radius:14px; font-size:16px; font-weight:800; cursor:pointer; width:100%; margin-top:8px; }
        .skip-btn { background:transparent; color:#ffaa00; border:1px solid #ffaa00; padding:10px; border-radius:14px; font-size:14px; cursor:pointer; width:100%; margin-top:4px; }
        #rocketBetRow { margin-bottom:8px; }
        #rocketBetRow button { background:var(--blue); }
    </style>
</head>
<body>
    <div class="header">🐾 Nyanbot <span>(miniapp)</span></div>
    
    <div class="chat" id="chat">
        <div class="msg bot">⚡ Подключаюсь...</div>
    </div>
    
    <div class="bottom-panel">
        <!-- Кнопки НАД строкой ввода -->
        <div class="actions">
            <button onclick="sendCmd('мяу')">🐾 Мяу</button>
            <button onclick="sendCmd('баланс')">💗 Бал</button>
            <button onclick="startRocket()">🚀 Ракета</button>
        </div>
        
        <!-- Строка ввода ставки для ракеты -->
        <div class="input-row" id="rocketBetRow" style="display:none;">
            <input type="number" id="betInput" placeholder="Сумма ставки..." value="100">
            <button onclick="launchRocket()">🚀</button>
        </div>
        
        <!-- Основная строка ввода -->
        <div class="input-row">
            <input type="text" id="cmdInput" placeholder="Введи команду..." autofocus>
            <button onclick="sendCmd()">➔</button>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();
        const chat = document.getElementById('chat');
        const input = document.getElementById('cmdInput');
        const initData = tg.initData || '';
        const API_URL = 'https://slightly-projector-rigging.ngrok-free.dev/api/command';

        function add(text, type) {
            const div = document.createElement('div');
            div.className = 'msg ' + type;
            div.innerHTML = text.replace(/\n/g, '<br>');
            chat.appendChild(div);
            chat.scrollTop = chat.scrollHeight;
            return div;
        }

        // При загрузке показываем приветствие
        function loadHello() {
            const xhr = new XMLHttpRequest();
            xhr.open('POST', API_URL, true);
            xhr.setRequestHeader('Content-Type', 'application/json');
            xhr.onload = function() {
                if (xhr.status === 200) {
                    const data = JSON.parse(xhr.responseText);
                    if (data.reply) {
                        chat.innerHTML = '';
                        add(data.reply, 'bot');
                    }
                }
            };
            xhr.send(JSON.stringify({ command: '/start', tg_data: initData }));
        }
        loadHello();

        function sendCmd(explicitCmd) {
            const cmd = explicitCmd || input.value.trim();
            if (!cmd) return;
            add(cmd, 'user');
            if (!explicitCmd) input.value = '';

            const xhr = new XMLHttpRequest();
            xhr.open('POST', API_URL, true);
            xhr.setRequestHeader('Content-Type', 'application/json');
            xhr.onload = function() {
                if (xhr.status === 200) {
                    const data = JSON.parse(xhr.responseText);
                    if (data.reply) add(data.reply, 'bot');
                    else if (data.message) add('❌ ' + data.message, 'bot');
                }
            };
            xhr.onerror = function() { add('❌ Ошибка', 'bot'); };
            xhr.send(JSON.stringify({ command: cmd, tg_data: initData }));
        }

        // Ракета
        let rocketMsg = null;
        let rocketInterval = null;

        function startRocket() {
            const row = document.getElementById('rocketBetRow');
            row.style.display = row.style.display === 'flex' ? 'none' : 'flex';
        }

        function launchRocket() {
            const bet = parseInt(document.getElementById('betInput').value) || 100;
            document.getElementById('rocketBetRow').style.display = 'none';
            
            const xhr = new XMLHttpRequest();
            xhr.open('POST', API_URL, true);
            xhr.setRequestHeader('Content-Type', 'application/json');
            xhr.onload = function() {
                const data = JSON.parse(xhr.responseText);
                if (data.status === 'success' && data.game) {
                    rocketMsg = add('🚀 Ракета взлетает!\n\n🟢 Шанс: 97%\n\n💰 Ставка: ' + bet + '🪙\n📈 x1.00\n💎 ' + bet + '🪙', 'rocket');
                    
                    const cashoutBtn = document.createElement('button');
                    cashoutBtn.className = 'cashout-btn';
                    cashoutBtn.textContent = '💰 ЗАБРАТЬ ВЫИГРЫШ';
                    cashoutBtn.onclick = cashoutRocket;
                    rocketMsg.appendChild(cashoutBtn);
                    
                    updateRocketState(bet);
                } else {
                    add('❌ ' + (data.message || 'Ошибка'), 'bot');
                }
            };
            xhr.send(JSON.stringify({ action: 'rocket_start', bet: bet, tg_data: initData }));
        }

        function updateRocketState(bet) {
            if (rocketInterval) clearInterval(rocketInterval);
            rocketInterval = setInterval(() => {
                const xhr = new XMLHttpRequest();
                xhr.open('POST', API_URL, true);
                xhr.setRequestHeader('Content-Type', 'application/json');
                xhr.onload = function() {
                    const data = JSON.parse(xhr.responseText);
                    if (!rocketMsg) { clearInterval(rocketInterval); return; }
                    
                    if (data.status === 'success' && data.active && !data.cashed_out) {
                        const mult = data.multiplier;
                        const pot = data.potential || Math.floor(bet * mult);
                        rocketMsg.childNodes[0].innerHTML = ('🚀 Ракета взлетает!\n\n🟢 Шанс: ' + (mult < 1.5 ? 97 : mult < 2.5 ? 82 : 50) + '%\n\n💰 Ставка: ' + bet + '🪙\n📈 x' + mult + '\n💎 ' + pot + '🪙').replace(/\n/g, '<br>');
                    } else if (!data.active || data.cashed_out) {
                        clearInterval(rocketInterval);
                        const oldBtns = rocketMsg.querySelectorAll('button');
                        oldBtns.forEach(b => b.remove());
                        
                        if (data.cashed_out) {
                            const winnings = data.winnings || 0;
                            const cashoutMult = data.cashout_multiplier || data.multiplier || 1;
                            const crashMult = data.multiplier || cashoutMult;
                            rocketMsg.childNodes[0].innerHTML = ('✅ СНЯТО НА x' + cashoutMult + '!\n💰 Выигрыш: ' + winnings + '🪙\n📈 Ракета взорвалась на x' + crashMult).replace(/\n/g, '<br>');
                            
                            const skipBtn = document.createElement('button');
                            skipBtn.className = 'skip-btn';
                            skipBtn.textContent = '⏭ ПРОПУСТИТЬ';
                            skipBtn.onclick = function() {
                                rocketMsg.childNodes[0].innerHTML = ('⏭ Пропущено\n💰 Выигрыш: ' + winnings + '🪙').replace(/\n/g, '<br>');
                                const btns = rocketMsg.querySelectorAll('button');
                                btns.forEach(b => b.remove());
                                rocketMsg = null;
                            };
                            rocketMsg.appendChild(skipBtn);
                        } else {
                            rocketMsg.childNodes[0].innerHTML = ('💥 РАКЕТА ВЗОРВАЛАСЬ НА x' + (data.multiplier || 1) + '!\n😢 Ставка ' + bet + '🪙 сгорела').replace(/\n/g, '<br>');
                            rocketMsg = null;
                        }
                    }
                };
                xhr.send(JSON.stringify({ action: 'rocket_state', tg_data: initData }));
            }, 600);
        }

        function cashoutRocket() {
            const xhr = new XMLHttpRequest();
            xhr.open('POST', API_URL, true);
            xhr.setRequestHeader('Content-Type', 'application/json');
            xhr.onload = function() {
                const data = JSON.parse(xhr.responseText);
                if (data.status === 'success' && rocketMsg) {
                    const mult = data.multiplier || 1;
                    const winnings = data.winnings || 0;
                    const oldBtns = rocketMsg.querySelectorAll('button');
                    oldBtns.forEach(b => b.remove());
                    rocketMsg.childNodes[0].innerHTML = ('✅ СНЯТО НА x' + mult + '!\n💰 Выигрыш: ' + winnings + '🪙\nРакета ещё летит...').replace(/\n/g, '<br>');
                    
                    const skipBtn = document.createElement('button');
                    skipBtn.className = 'skip-btn';
                    skipBtn.textContent = '⏭ ПРОПУСТИТЬ';
                    skipBtn.onclick = function() {
                        rocketMsg.childNodes[0].innerHTML = ('⏭ Пропущено\n💰 Выигрыш: ' + winnings + '🪙').replace(/\n/g, '<br>');
                        const btns = rocketMsg.querySelectorAll('button');
                        btns.forEach(b => b.remove());
                        rocketMsg = null;
                        clearInterval(rocketInterval);
                    };
                    rocketMsg.appendChild(skipBtn);
                }
            };
            xhr.send(JSON.stringify({ action: 'rocket_cashout', tg_data: initData }));
        }

        input.addEventListener('keypress', e => { if (e.key === 'Enter') sendCmd(); });
        tg.MainButton.setText('Закрыть').show().onClick(() => tg.close());
    </script>
</body>
</html>
