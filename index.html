<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Slimnyan Console</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg: #0b0b12;
            --panel: #151520;
            --accent: #e94560;
            --green: #00e676;
            --text: #eee;
            --muted: #999;
        }
        * { margin:0; padding:0; box-sizing:border-box; font-family: -apple-system, sans-serif; }
        body { background:var(--bg); color:var(--text); height:100vh; display:flex; flex-direction:column; }
        .header { padding:16px; text-align:center; font-size:18px; font-weight:700; border-bottom:1px solid #222; }
        .log { flex:1; overflow-y:auto; padding:16px; display:flex; flex-direction:column; gap:10px; }
        .msg { max-width:85%; padding:10px 14px; border-radius:14px; font-size:14px; line-height:1.4; animation: fadeIn .2s; }
        @keyframes fadeIn { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:translateY(0)} }
        .msg.user { background:#1e3a5f; align-self:flex-end; border-bottom-right-radius:4px; }
        .msg.bot  { background:var(--panel); align-self:flex-start; border-bottom-left-radius:4px; }
        .actions { display:flex; flex-wrap:wrap; gap:8px; padding:12px; border-top:1px solid #222; }
        .actions button { background:#1f1f30; color:var(--green); border:none; padding:10px 14px; border-radius:20px; font-size:13px; cursor:pointer; }
        .input-row { display:flex; gap:8px; padding:0 12px 16px; }
        .input-row input { flex:1; padding:14px; border-radius:24px; border:none; background:#1f1f30; color:#fff; font-size:15px; }
        .input-row button { width:48px; height:48px; border-radius:50%; border:none; background:var(--accent); color:#fff; font-size:18px; }
    </style>
</head>
<body>
    <div class="header">🚀 Slimnyan Console</div>
    <div class="log" id="log">
        <div class="msg bot">🤖 Привет! Я локальное ядро бота.<br>Пиши команды — всё работает офлайн.</div>
    </div>
    <div class="actions">
        <button onclick="run('мяу')">🐾 Мяу</button>
        <button onclick="run('баланс')">💗 Баланс</button>
        <button onclick="run('ты кто')">👤 Профиль</button>
        <button onclick="run('топмяу')">🏆 Топ</button>
    </div>
    <div class="input-row">
        <input id="cmd" placeholder="Команда..." autofocus>
        <button onclick="run()">▶</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        const log = document.getElementById('log');
        const cmdInput = document.getElementById('cmd');

        // Достаём реальные данные пользователя из Telegram
        const user = tg.initDataUnsafe?.user || {};
        const uid = user.id ? String(user.id) : 'unknown';
        const firstName = user.first_name || 'Котик';

        // Локальное хранилище (эмулирует bot_data.json)
        const storageKey = 'slimnyan_user_' + uid;
        let localData = JSON.parse(localStorage.getItem(storageKey)) || {
            balls: 0,
            meowcoins: 1000,
            last_meow: 0,
            refs: 0
        };

        function save() {
            localStorage.setItem(storageKey, JSON.stringify(localData));
        }

        function add(msg, type) {
            const div = document.createElement('div');
            div.className = 'msg ' + type;
            div.textContent = msg;
            log.appendChild(div);
            log.scrollTop = log.scrollHeight;
        }

        function run(explicit) {
            const cmd = (explicit || cmdInput.value).trim().toLowerCase();
            if (!cmd) return;

            add(cmd, 'user');
            if (!explicit) cmdInput.value = '';

            let reply = '';

            // ── МЯУ ──
            if (['мяу', '.мяу', '!мяу'].includes(cmd)) {
                const now = Date.now();
                if (now - localData.last_meow < 3600000) {
                    const left = Math.ceil((3600000 - (now - localData.last_meow)) / 60000);
                    reply = `⏳ ${firstName}, жди ещё ${left} мин.`;
                } else {
                    localData.balls += 1;
                    localData.last_meow = now;
                    const coins = Math.floor(Math.random() * 30) + 1;
                    localData.meowcoins += coins;
                    save();
                    reply = `🐾 ${firstName} мяукнул(а) +1 балл\n🪙 +${coins} мяукоинов`;
                }
            }
            // ── БАЛАНС ──
            else if (['бал', 'баланс', 'балл'].includes(cmd)) {
                reply = `💗 ${firstName}\nБаллы: ${localData.balls}\n🪙 Мяукоины: ${localData.meowcoins}`;
            }
            // ── ПРОФИЛЬ ──
            else if (['префикс', 'кто я', 'статус'].includes(cmd)) {
                reply = `👤 ${firstName}\nСтатус: 👤 User`;
            }
            else if (cmd === 'ты кто') {
                reply = `👤 ${firstName}\nБаллы: ${localData.balls}\n🪙 Мяукоины: ${localData.meowcoins}`;
            }
            // ── ТОПЫ (просто заглушка) ──
            else if (cmd === 'топмяу') {
                reply = `🏆 Топ мяукалок:\n\n1. ${firstName} — ${localData.balls} баллов`;
            }
            else if (['топкоины', 'топмяукоины'].includes(cmd)) {
                reply = `🪙 Топ мяукоинов:\n\n1. ${firstName} — ${localData.meowcoins}`;
            }
            else {
                reply = `❌ Неизвестная команда: ${cmd}`;
            }

            setTimeout(() => add(reply, 'bot'), 200);
        }

        cmdInput.addEventListener('keypress', e => {
            if (e.key === 'Enter') run();
        });

        tg.MainButton.setText('Закрыть').show().onClick(() => tg.close());
    </script>
</body>
</html>
