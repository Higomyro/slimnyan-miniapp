<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Slimnyan Console</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --bg: #0b0b12; --panel: #151520; --accent: #e94560; --green: #00e676; --text: #eee; }
        * { margin:0; padding:0; box-sizing:border-box; font-family: -apple-system, sans-serif; }
        body { background:var(--bg); color:var(--text); height:100vh; display:flex; flex-direction:column; }
        .header { padding:16px; text-align:center; font-size:18px; font-weight:700; border-bottom:1px solid #222; }
        .chat { flex:1; overflow-y:auto; padding:16px; display:flex; flex-direction:column; gap:10px; }
        .msg { max-width:85%; padding:10px 14px; border-radius:14px; font-size:14px; line-height:1.4; animation: fadeIn .2s; }
        @keyframes fadeIn { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:translateY(0)} }
        .msg.user { background:#1e3a5f; align-self:flex-end; border-bottom-right-radius:4px; }
        .msg.bot { background:var(--panel); align-self:flex-start; border-bottom-left-radius:4px; }
        .actions { display:flex; flex-wrap:wrap; gap:8px; padding:12px; }
        .actions button { background:#1f1f30; color:var(--green); border:none; padding:10px 14px; border-radius:20px; font-size:13px; cursor:pointer; }
        .input-row { display:flex; gap:8px; padding:0 12px 16px; }
        .input-row input { flex:1; padding:14px; border-radius:24px; border:none; background:#1f1f30; color:#fff; font-size:15px; }
        .input-row button { width:48px; height:48px; border-radius:50%; border:none; background:var(--accent); color:#fff; font-size:18px; cursor:pointer; }
    </style>
</head>
<body>
    <div class="header">🚀 Slimnyan Console</div>
    <div class="chat" id="chat">
        <div class="msg bot">✅ Подключено к боту!</div>
        <div class="msg bot">💡 Команды: мяу, баланс, ты кто, ракета 100, рул кра 500</div>
    </div>
    <div class="actions">
        <button onclick="sendCmd('мяу')">🐾 Мяу</button>
        <button onclick="sendCmd('баланс')">💗 Баланс</button>
        <button onclick="sendCmd('ты кто')">👤 Профиль</button>
        <button onclick="sendCmd('ракета 100')">🚀 Ракета</button>
    </div>
    <div class="input-row">
        <input type="text" id="cmdInput" placeholder="Команда..." autofocus>
        <button onclick="sendCmd()">▶</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        const chat = document.getElementById('chat');
        const input = document.getElementById('cmdInput');
        const initData = tg.initData || '';

        // Автоматически используем сохранённый URL или дефолтный
        let API_URL = localStorage.getItem('ngrok_url') || 'https://slightly-projector-rigging.ngrok-free.dev/api/command';

        function add(text, type) {
            const div = document.createElement('div');
            div.className = 'msg ' + type;
            div.textContent = text;
            chat.appendChild(div);
            chat.scrollTop = chat.scrollHeight;
        }

        async function sendCmd(explicitCmd) {
            const cmd = explicitCmd || input.value.trim();
            if (!cmd) return;

            add(explicitCmd || input.value, 'user');
            if (!explicitCmd) input.value = '';

            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ command: cmd, tg_data: initData })
                });
                const data = await response.json();
                if (data.status === 'success') {
                    add(data.reply, 'bot');
                } else {
                    add('❌ ' + data.message, 'bot');
                }
            } catch (e) {
                add('❌ Ошибка соединения', 'bot');
            }
        }

        input.addEventListener('keypress', e => { if (e.key === 'Enter') sendCmd(); });
        tg.MainButton.setText('Закрыть').show().onClick(() => tg.close());
    </script>
</body>
</html>
