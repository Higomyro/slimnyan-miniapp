<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Nyanbot Ultra UI</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">

<link rel="stylesheet" href="style.css">
<script src="config.js"></script>
<script src="utils.js"></script>
<script src="rocket.js"></script>
<script src="main.js"></script>

<script>
// Глобальная функция отправки команды
function sendMessage(cmd) {
    const input = document.getElementById('cmdInput');
    const command = cmd || (input ? input.value.trim() : '');
    if (!command) return;
    
    addMessage(command, 'user');
    if (!cmd && input) input.value = '';
    
    sendToAPI({ command: command }, (err, data) => {
        if (err) {
            addMessage('❌ ' + err, 'bot');
            return;
        }
        let reply = data.reply || data.message;
        if (reply) {
            addMessage(reply, 'bot');
        } else if (data.status === 'success') {
            addMessage('✅ Выполнено', 'bot');
        } else {
            addMessage('❌ Неизвестная команда', 'bot');
        }
    });
}

// Заглушка для ракеты
function startRocket() {
    addMessage('🚀 Ракета временно в разработке. Скоро появится!', 'bot');
}

// Получение имени пользователя
let userName = 'Пользователь';
try {
    if (tg.initDataUnsafe && tg.initDataUnsafe.user && tg.initDataUnsafe.user.first_name) {
        userName = tg.initDataUnsafe.user.first_name;
    }
} catch(e) {}

document.addEventListener('DOMContentLoaded', function() {
    const input = document.getElementById('cmdInput');
    if (input) {
        input.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') sendMessage();
        });
    }
    // Статус подключения с именем
    updateStatus('✅ ' + userName + ', вы подключились к серверу', true);
});
</script>

</head>
<body>

<div class="grid"></div>
<div class="blur blur1"></div>
<div class="blur blur2"></div>
<div class="blur blur3"></div>

<div class="header">
    <div class="header-left">
        <div class="logo">🐾</div>
        <div class="logo-text">
            <h1>Nyanbot</h1>
            <p>ultra miniapp interface</p>
        </div>
    </div>
    <div class="online" id="onlineStatus">🟢 online</div>
</div>

<div class="chat" id="chat">
    <div class="msg bot">⚡ Подключение к серверу...</div>
</div>

<div class="bottom">
    <div class="actions">
        <button onclick="sendMessage('мяу')">🐾 Мяу</button>
        <button onclick="sendMessage('баланс')">💰 Баланс</button>
        <button onclick="startRocket()">🚀 Ракета</button>
    </div>

    <div class="input-wrap">
        <div class="input-row">
            <input type="text" id="cmdInput" placeholder="Введите команду..." autofocus>
            <button class="send-btn" onclick="sendMessage()">➜</button>
        </div>
    </div>
</div>

</body>
</html>
