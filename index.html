<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nyanbot Console</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --bg: #0b0b12; --panel: #151520; --accent: #e94560; --green: #00e676; --text: #eee; }
        * { margin:0; padding:0; box-sizing:border-box; font-family: -apple-system, sans-serif; }
        body { background:var(--bg); color:var(--text); height:100vh; display:flex; flex-direction:column; }
        .header { padding:16px; text-align:center; font-size:18px; font-weight:700; border-bottom:1px solid #222; }
        .chat { flex:1; overflow-y:auto; padding:16px; display:flex; flex-direction:column; gap:10px; }
        .msg { max-width:85%; padding:10px 14px; border-radius:14px; font-size:14px; line-height:1.4; animation:fadeIn 0.2s; }
        @keyframes fadeIn { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:translateY(0)} }
        .msg.user { background:#1e3a5f; align-self:flex-end; border-bottom-right-radius:4px; }
        .msg.bot { background:var(--panel); align-self:flex-start; border-bottom-left-radius:4px; }
        .msg.rocket { background:linear-gradient(145deg,#1d0b2e,#11051c); border:1px solid var(--accent); box-shadow:0 0 15px rgba(255,42,95,0.4); align-self:center; text-align:center; width:90%; }
        .actions { display:flex; flex-wrap:wrap; gap:8px; padding:12px; }
        .actions button { background:#1f1f30; color:var(--green); border:none; padding:10px 14px; border-radius:20px; font-size:13px; cursor:pointer; }
        .input-row { display:flex; gap:8px; padding:0 12px 16px; }
        .input-row input { flex:1; padding:14px; border-radius:24px; border:none; background:#1f1f30; color:#fff; font-size:15px; }
        .input-row button { width:48px; height:48px; border-radius:50%; border:none; background:var(--accent); color:#fff; font-size:18px; cursor:pointer; }
        .cashout-btn { background:linear-gradient(90deg,#00ff88,#00e676); color:#000; padding:14px; border:none; border-radius:14px; font-size:16px; font-weight:800; cursor:pointer; width:100%; margin-top:8px; }
        .skip-btn { background:transparent; color:#ffaa00; border:1px solid #ffaa00; padding:10px; border-radius:14px; font-size:14px; cursor:pointer; width:100%; margin-top:4px; }
    </style>
</head>
<body>
    <div class="header">🚀 Nyanbot Console</div>
    <div class="chat" id="chat">
        <div class="msg bot">✅ Подключено к боту!</div>
        <div class="msg bot">💡 Пиши любые команды: мяу, баланс, ты кто, ракета 100, рул кра 500, бизнес, казино...</div>
    </div>
    <div class="actions">
        <button onclick="sendCmd('мяу')">🐾 Мяу</button>
        <button onclick="sendCmd('баланс')">💗 Баланс</button>
        <button onclick="sendCmd('ты кто')">👤 Профиль</button>
        <button onclick="sendCmd('ракета 100')">🚀 Ракета</button>
        <button onclick="sendCmd('рул кра 50')">🎡 Рулетка</button>
        <button onclick="sendCmd('бизнес')">🏭 Бизнес</button>
        <button onclick="sendCmd('казино')">🎰 Казино</button>
    </div>
    <div class="input-row">
        <input type="text" id="cmdInput" placeholder="Любая команда..." autofocus>
        <button onclick="sendCmd()">▶</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();
        const chat = document.getElementById('chat');
        const input = document.getElementById('cmdInput');
        const initData = tg.initData || '';
        const API_URL = 'https://slightly-projector-rigging.ngrok-free.dev/api/command';

        function add(text, type) {
            const div = document.createElement('div');
            div.className = 'msg ' + type;
            div.textContent = text;
            chat.appendChild(div);
            chat.scrollTop = chat.scrollHeight;
            return div;
        }

        function sendCmd(explicitCmd) {
            const cmd = explicitCmd || input.value.trim();
            if (!cmd) return;
            add(cmd, 'user');
            if (!explicitCmd) input.value = '';
            const xhr = new XMLHttpRequest();
            xhr.open('POST', API_URL, true);
            xhr.setRequestHeader('Content-Type', 'application/json');
            xhr.onload = function() {
                if (xhr.status === 200) {
                    const data = JSON.parse(xhr.responseText);
                    if (data.reply) add(data.reply, 'bot');
                    else if (data.message) add('❌ ' + data.message, 'bot');
                }
            };
            xhr.onerror = function() { add('❌ Ошибка', 'bot'); };
            xhr.send(JSON.stringify({ command: cmd, tg_data: initData }));
        }

        input.addEventListener('keypress', e => { if (e.key === 'Enter') sendCmd(); });
        tg.MainButton.setText('Закрыть').show().onClick(() => tg.close());
    </script>
</body>
</html>
