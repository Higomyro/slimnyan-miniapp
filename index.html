<!DOCTYPE html>
<html lang="ru">
<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width,
initial-scale=1.0,
maximum-scale=1.0,
user-scalable=no">

<title>Nyanbot</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>

/* ===== IOS + DISCORD + CRYPTO STYLE ===== */

:root{
    --bg:#050507;
    --panel:#0f1017;
    --panel2:#171924;
    --glass:rgba(255,255,255,.05);

    --accent:#ff2d6f;
    --accent2:#ff5fa2;

    --blue:#00d4ff;
    --green:#00ffb3;
    --purple:#8b5cf6;

    --text:#ffffff;
    --sub:#8d92a6;

    --border:rgba(255,255,255,.08);

    --shadow:
        0 10px 40px rgba(0,0,0,.45);

    --glow:
        0 0 40px rgba(255,45,111,.35);
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;

    font-family:'Inter',sans-serif;

    -webkit-tap-highlight-color:transparent;
}

html,
body{
    width:100%;
    height:100%;
    overflow:hidden;
}

body{
    background:
        radial-gradient(circle at top left,
            rgba(255,45,111,.18),
            transparent 30%),

        radial-gradient(circle at top right,
            rgba(0,212,255,.14),
            transparent 30%),

        radial-gradient(circle at bottom,
            rgba(139,92,246,.14),
            transparent 35%),

        var(--bg);

    color:var(--text);

    display:flex;
    flex-direction:column;
}

/* ===== FLOATING BLUR ===== */

.blur1,
.blur2{
    position:fixed;

    width:240px;
    height:240px;

    border-radius:50%;

    filter:blur(90px);

    pointer-events:none;

    opacity:.18;

    z-index:-1;
}

.blur1{
    background:#ff2d6f;

    top:-80px;
    left:-80px;
}

.blur2{
    background:#00d4ff;

    bottom:-80px;
    right:-80px;
}

/* ===== HEADER ===== */

.header{
    position:sticky;
    top:0;

    z-index:100;

    padding:18px 18px 16px;

    display:flex;
    align-items:center;
    justify-content:space-between;

    background:
        linear-gradient(to bottom,
            rgba(5,5,7,.92),
            rgba(5,5,7,.68));

    backdrop-filter:blur(24px);

    border-bottom:
        1px solid rgba(255,255,255,.04);
}

.left{
    display:flex;
    align-items:center;
    gap:14px;
}

.logo{
    width:50px;
    height:50px;

    border-radius:18px;

    background:
        linear-gradient(145deg,
            var(--accent),
            var(--purple));

    display:flex;
    align-items:center;
    justify-content:center;

    font-size:24px;

    box-shadow:
        var(--glow),
        inset 0 1px 0 rgba(255,255,255,.2);
}

.name h1{
    font-size:18px;
    font-weight:800;
    letter-spacing:.2px;
}

.name p{
    color:var(--sub);
    font-size:12px;
    margin-top:3px;
}

.profile{
    width:44px;
    height:44px;

    border-radius:16px;

    background:
        rgba(255,255,255,.05);

    border:1px solid var(--border);

    display:flex;
    align-items:center;
    justify-content:center;

    font-size:18px;

    backdrop-filter:blur(20px);
}

/* ===== CHAT ===== */

.chat{
    flex:1;

    min-height:0;

    overflow-y:auto;

    overflow-x:hidden;

    padding:18px;

    display:flex;
    flex-direction:column;

    gap:14px;

    scroll-behavior:smooth;
}

.chat::-webkit-scrollbar{
    width:0;
}

/* ===== MSG ===== */

.msg{
    max-width:86%;

    padding:16px 18px;

    border-radius:28px;

    position:relative;

    animation:show .25s ease;

    line-height:1.5;

    font-size:14.5px;

    overflow:hidden;

    box-shadow:var(--shadow);

    word-break:break-word;

    white-space:pre-wrap;
}

@keyframes show{
    from{
        transform:
            translateY(12px)
            scale(.98);

        opacity:0;
    }

    to{
        transform:none;
        opacity:1;
    }
}

.msg::before{
    content:'';

    position:absolute;
    inset:0;

    background:
        linear-gradient(
            120deg,
            transparent,
            rgba(255,255,255,.04),
            transparent
        );

    transform:translateX(-100%);
    animation:shine 4s linear infinite;
}

@keyframes shine{
    to{
        transform:translateX(100%);
    }
}

.msg.bot{
    align-self:flex-start;

    background:
        linear-gradient(145deg,
            rgba(23,25,36,.92),
            rgba(14,15,23,.96));

    border:
        1px solid rgba(255,255,255,.06);

    backdrop-filter:blur(20px);
}

.msg.user{
    align-self:flex-end;

    background:
        linear-gradient(145deg,
            #2563eb,
            #1d4ed8);

    border:
        1px solid rgba(255,255,255,.08);

    box-shadow:
        0 10px 35px rgba(37,99,235,.35);
}

/* ===== ROCKET ===== */

.msg.rocket{
    width:100%;

    max-width:100%;

    padding:18px;

    border-radius:28px;

    text-align:center;

    display:flex;
    flex-direction:column;

    gap:6px;

    background:
        linear-gradient(145deg,
            rgba(30,10,40,.96),
            rgba(15,6,20,.98));

    border:
        1px solid rgba(255,45,111,.25);

    box-shadow:
        0 0 50px rgba(255,45,111,.2);
}

.rocket-title{
    font-size:18px;
    font-weight:800;

    color:#ff74aa;
}

.rocket-mult{
    font-size:34px;
    font-weight:900;
}

.rocket-win{
    font-size:18px;
    font-weight:800;

    color:var(--green);
}

/* ===== BOTTOM ===== */

.bottom{
    padding:14px;

    background:
        linear-gradient(to top,
            rgba(7,7,12,.95),
            rgba(7,7,12,.72));

    backdrop-filter:blur(30px);

    border-top:
        1px solid rgba(255,255,255,.05);
}

/* ===== ACTIONS ===== */

.actions{
    display:grid;
    grid-template-columns:repeat(3,1fr);

    gap:12px;

    margin-bottom:14px;
}

.actions button{
    position:relative;

    overflow:hidden;

    border:none;

    padding:15px;

    border-radius:22px;

    background:
        linear-gradient(145deg,
            rgba(255,255,255,.06),
            rgba(255,255,255,.03));

    border:
        1px solid rgba(255,255,255,.08);

    color:white;

    font-weight:700;

    font-size:14px;

    backdrop-filter:blur(18px);

    cursor:pointer;

    transition:.18s;

    box-shadow:var(--shadow);
}

.actions button:active{
    transform:scale(.95);
}

/* ===== INPUT ===== */

.input-wrap{
    display:flex;
    flex-direction:column;
    gap:10px;
}

.input-row{
    display:flex;
    align-items:center;
    gap:10px;

    padding:8px 8px 8px 18px;

    border-radius:26px;

    background:
        linear-gradient(145deg,
            rgba(255,255,255,.06),
            rgba(255,255,255,.03));

    border:
        1px solid rgba(255,255,255,.08);

    backdrop-filter:blur(20px);

    box-shadow:var(--shadow);
}

.input-row input{
    flex:1;

    background:none;
    border:none;
    outline:none;

    color:white;

    font-size:15px;
}

.input-row input::placeholder{
    color:#7f8497;
}

.send{
    width:48px;
    height:48px;

    border:none;

    border-radius:18px;

    background:
        linear-gradient(145deg,
            var(--accent),
            var(--accent2));

    color:white;

    font-size:18px;

    cursor:pointer;

    box-shadow:
        0 0 30px rgba(255,45,111,.35);
}

/* ===== BUTTONS ===== */

.cashout-btn{
    width:100%;

    margin-top:10px;

    border:none;

    border-radius:20px;

    padding:16px;

    background:
        linear-gradient(145deg,
            var(--green),
            #00d48f);

    color:black;

    font-size:15px;
    font-weight:900;

    cursor:pointer;
}

.skip-btn{
    width:100%;

    margin-top:8px;

    border:none;

    border-radius:18px;

    padding:14px;

    background:
        rgba(255,255,255,.05);

    border:
        1px solid rgba(255,255,255,.08);

    color:#ffc85e;

    font-weight:700;

    cursor:pointer;
}

</style>
</head>

<body>

<div class="blur1"></div>
<div class="blur2"></div>

<div class="header">

    <div class="left">

        <div class="logo">
            🐾
        </div>

        <div class="name">
            <h1>Nyanbot</h1>
            <p>miniapp interface</p>
        </div>

    </div>

    <div class="profile">
        ⚡
    </div>

</div>

<div class="chat" id="chat">

    <div class="msg bot">
        ⚡ Подключение к серверу...
    </div>

</div>

<div class="bottom">

    <div class="actions">

        <button onclick="sendCmd('мяу')">
            🐾 Мяу
        </button>

        <button onclick="sendCmd('баланс')">
            💰 Баланс
        </button>

        <button onclick="startRocket()">
            🚀 Ракета
        </button>

    </div>

    <div class="input-wrap">

        <div class="input-row"
        id="rocketBetRow"
        style="display:none;">

            <input
            type="number"
            id="betInput"
            placeholder="Ставка..."
            value="100">

            <button
            class="send"
            onclick="launchRocket()">
                🚀
            </button>

        </div>

        <div class="input-row">

            <input
            type="text"
            id="cmdInput"
            placeholder="Введите команду..."
            autofocus>

            <button
            class="send"
            onclick="sendCmd()">
                ➜
            </button>

        </div>

    </div>

</div>

<script>

const tg =
window.Telegram.WebApp;

tg.ready();
tg.expand();

const chat =
document.getElementById('chat');

const input =
document.getElementById('cmdInput');

function add(text,type){

    const div =
    document.createElement('div');

    div.className =
    'msg ' + type;

    div.innerHTML = text;

    chat.appendChild(div);

    setTimeout(()=>{
        chat.scrollTop =
        chat.scrollHeight;
    },10);

    return div;
}

/* ===== CONNECTION ===== */

setTimeout(()=>{

    add(
    '🔐 Проверка соединения...',
    'bot');

},700);

setTimeout(()=>{

    add(
    '✅ Соединение установлено',
    'bot');

},1500);

setTimeout(()=>{

    add(
`👋 Добро пожаловать в Nyanbot

💬 Введите команду ниже`,
'bot');

},2300);

/* ===== COMMANDS ===== */

function sendCmd(explicitCmd){

    const cmd =
    explicitCmd ||
    input.value.trim();

    if(!cmd) return;

    add(cmd,'user');

    input.value = '';
/* ===== ПРОДОЛЖЕНИЕ SCRIPT ===== */

    setTimeout(()=>{

        add(
`🤖 Команда получена:

${cmd}`,
'bot');

    },450);
}

/* ===== ENTER ===== */

input.addEventListener(
'keypress',
e=>{

    if(e.key === 'Enter'){
        sendCmd();
    }
});

/* ===== ROCKET ===== */

let rocketMsg = null;
let rocketInterval = null;

function startRocket(){

    const row =
    document.getElementById(
    'rocketBetRow'
    );

    row.style.display =
    row.style.display === 'flex'
    ? 'none'
    : 'flex';
}

function launchRocket(){

    const bet =
    parseInt(
        document.getElementById(
            'betInput'
        ).value
    ) || 100;

    document.getElementById(
        'rocketBetRow'
    ).style.display = 'none';

    rocketMsg =
    add(`
<div class="rocket-title">
🚀 РАКЕТА ВЗЛЕТАЕТ
</div>

<div class="rocket-mult">
x1.00
</div>

<div>
💰 Ставка:
<b>${bet}🪙</b>
</div>

<div class="rocket-win">
💎 ${bet}🪙
</div>
`,
'rocket');

    const cashoutBtn =
    document.createElement('button');

    cashoutBtn.className =
    'cashout-btn';

    cashoutBtn.innerText =
    '💰 ЗАБРАТЬ ВЫИГРЫШ';

    cashoutBtn.onclick =
    cashoutRocket;

    rocketMsg.appendChild(
        cashoutBtn
    );

    updateRocketState(bet);
}

function updateRocketState(bet){

    if(rocketInterval){
        clearInterval(
            rocketInterval
        );
    }

    let multiplier = 1;

    rocketInterval =
    setInterval(()=>{

        if(!rocketMsg){
            clearInterval(
                rocketInterval
            );
            return;
        }

        multiplier +=
        +(Math.random() * .16)
        .toFixed(2);

        const chance =
        multiplier < 1.5
        ? 97
        : multiplier < 2.5
        ? 82
        : multiplier < 4
        ? 55
        : 30;

        const potential =
        Math.floor(
            bet * multiplier
        );

        rocketMsg.innerHTML =
`
<div class="rocket-title">
🚀 РАКЕТА ВЗЛЕТАЕТ
</div>

<div class="rocket-mult">
x${multiplier.toFixed(2)}
</div>

<div>
🟢 Шанс:
<b>${chance}%</b>
</div>

<div>
💰 Ставка:
<b>${bet}🪙</b>
</div>

<div class="rocket-win">
💎 ${potential}🪙
</div>
`;

        const cashoutBtn =
        document.createElement(
            'button'
        );

        cashoutBtn.className =
        'cashout-btn';

        cashoutBtn.innerText =
        '💰 ЗАБРАТЬ ВЫИГРЫШ';

        cashoutBtn.onclick =
        cashoutRocket;

        rocketMsg.appendChild(
            cashoutBtn
        );

        /* ВЗРЫВ */

        const explodeChance =
        Math.random();

        if(
            (multiplier > 1.4 &&
            explodeChance < .07)

            ||

            (multiplier > 2 &&
            explodeChance < .12)

            ||

            (multiplier > 3 &&
            explodeChance < .2)
        ){

            clearInterval(
                rocketInterval
            );

            rocketMsg.innerHTML =
`
<div class="rocket-title">
💥 РАКЕТА ВЗОРВАЛАСЬ
</div>

<div class="rocket-mult">
x${multiplier.toFixed(2)}
</div>

<div>
😢 Ставка
<b>${bet}🪙</b>
сгорела
</div>
`;

            setTimeout(()=>{

                rocketMsg = null;

            },600);
        }

    },600);
}

function cashoutRocket(){

    if(!rocketMsg){
        return;
    }

    clearInterval(
        rocketInterval
    );

    const multText =
    rocketMsg.querySelector(
        '.rocket-mult'
    ).innerText;

    const multiplier =
    parseFloat(
        multText.replace('x','')
    );

    const winnings =
    Math.floor(
        100 * multiplier
    );

    rocketMsg.innerHTML =
`
<div class="rocket-title">
✅ СНЯТО НА x${multiplier.toFixed(2)}
</div>

<div class="rocket-win">
💰 ${winnings}🪙
</div>

<div>
🚀 Ракета ещё летит...
</div>
`;

    const skipBtn =
    document.createElement(
        'button'
    );

    skipBtn.className =
    'skip-btn';

    skipBtn.innerText =
    '⏭ ПРОПУСТИТЬ';

    skipBtn.onclick =
    function(){

        rocketMsg.innerHTML =
`
<div class="rocket-title">
⏭ ПРОПУЩЕНО
</div>

<div class="rocket-win">
💰 ${winnings}🪙
</div>
`;

        setTimeout(()=>{

            rocketMsg = null;

        },300);
    };

    rocketMsg.appendChild(
        skipBtn
    );
}

/* ===== TG BUTTON ===== */

tg.MainButton
.setText('Закрыть')
.show()
.onClick(()=>{

    tg.close();

});

</script>

</body>
</html>
