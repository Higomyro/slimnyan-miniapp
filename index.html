<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width,
initial-scale=1.0,
maximum-scale=1.0,
user-scalable=no">

<title>Nyanbot</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>

:root{
    --bg:#0b0d14;

    --panel:#171a24;

    --accent:#ff2d75;
    --accent2:#ff5d95;

    --green:#00ffb3;

    --text:#fff;
    --sub:#8e94a9;

    --border:rgba(255,255,255,.06);
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;

    font-family:'Inter',sans-serif;

    -webkit-tap-highlight-color:transparent;
}

html,
body{
    width:100%;
    height:100%;
    overflow:hidden;
}

body{
    display:flex;
    flex-direction:column;

    background:
        radial-gradient(circle at top left,
        rgba(255,45,117,.12),
        transparent 28%),

        #0b0d14;

    color:white;
}

/* HEADER */

.header{
    height:76px;

    flex-shrink:0;

    padding:14px 16px;

    display:flex;
    align-items:center;
    justify-content:space-between;

    background:
        rgba(16,18,28,.92);

    border-bottom:
        1px solid var(--border);
}

.header-left{
    display:flex;
    align-items:center;

    gap:12px;
}

.logo{
    width:46px;
    height:46px;

    border-radius:14px;

    display:flex;
    align-items:center;
    justify-content:center;

    font-size:22px;

    background:
        linear-gradient(145deg,
        var(--accent),
        #7b61ff);
}

.logo-text h1{
    font-size:17px;
    font-weight:800;
}

.logo-text p{
    margin-top:2px;

    font-size:12px;

    color:var(--sub);
}

.status{
    padding:9px 12px;

    border-radius:14px;

    background:
        rgba(255,255,255,.04);

    border:
        1px solid rgba(255,255,255,.05);

    color:var(--green);

    font-size:13px;
    font-weight:700;
}

/* CHAT */

.chat{
    flex:1;

    min-height:0;

    overflow-y:auto;

    padding:16px;

    display:flex;
    flex-direction:column;

    gap:10px;
}

.chat::-webkit-scrollbar{
    width:0;
}

/* MESSAGE */

.msg{
    width:fit-content;

    max-width:84%;

    padding:14px 15px;

    border-radius:20px;

    font-size:14px;

    line-height:1.45;

    word-break:break-word;

    white-space:pre-wrap;

    animation:show .18s ease;
}

@keyframes show{
    from{
        opacity:0;
        transform:translateY(8px);
    }

    to{
        opacity:1;
        transform:none;
    }
}

.msg.bot{
    align-self:flex-start;

    background:
        #171a24;

    border:
        1px solid rgba(255,255,255,.04);
}

.msg.user{
    align-self:flex-end;

    background:
        linear-gradient(145deg,
        #2563eb,
        #1d4ed8);
}

/* ROCKET */

.msg.rocket{
    width:100%;
    max-width:100%;

    padding:18px;

    border-radius:24px;

    text-align:center;

    display:flex;
    flex-direction:column;

    gap:6px;

    background:
        linear-gradient(145deg,
        #241228,
        #17101f);

    border:
        1px solid rgba(255,45,117,.14);
}

.rocket-title{
    font-size:17px;
    font-weight:800;

    color:#ff72a8;
}

.rocket-mult{
    font-size:32px;
    font-weight:900;
}

.rocket-win{
    font-size:18px;
    font-weight:800;

    color:var(--green);
}

/* BOTTOM */

.bottom{
    flex-shrink:0;

    padding:12px;

    background:
        rgba(16,18,28,.95);

    border-top:
        1px solid rgba(255,255,255,.05);
}

/* BUTTONS */

.actions{
    display:grid;

    grid-template-columns:
        repeat(3,1fr);

    gap:8px;

    margin-bottom:10px;
}

.actions button{
    border:none;

    padding:13px;

    border-radius:16px;

    background:
        #171a24;

    border:
        1px solid rgba(255,255,255,.05);

    color:white;

    font-size:14px;
    font-weight:700;

    cursor:pointer;
}

.actions button:active{
    transform:scale(.97);
}

/* INPUT */

.input-wrap{
    display:flex;
    flex-direction:column;

    gap:10px;
}

.input-row{
    display:flex;
    align-items:center;

    gap:8px;

    padding:8px 8px 8px 15px;

    border-radius:22px;

    background:
        #171a24;

    border:
        1px solid rgba(255,255,255,.05);
}

.input-row input{
    flex:1;

    border:none;
    outline:none;

    background:none;

    color:white;

    font-size:15px;
}

.input-row input::placeholder{
    color:#7f879c;
}

.send-btn{
    width:46px;
    height:46px;

    border:none;

    border-radius:15px;

    background:
        linear-gradient(145deg,
        var(--accent),
        var(--accent2));

    color:white;

    font-size:17px;

    cursor:pointer;
}

/* ROCKET BUTTONS */

.cashout-btn,
.skip-btn{
    width:100%;

    margin-top:8px;

    min-height:48px;

    border:none;

    border-radius:16px;

    font-size:14px;
    font-weight:800;

    cursor:pointer;
}

.cashout-btn{
    background:
        linear-gradient(145deg,
        var(--green),
        #00d18f);

    color:black;
}

.skip-btn{
    background:
        rgba(255,255,255,.05);

    color:#ffc861;
}

</style>
</head>

<body>

<div class="header">

    <div class="header-left">

        <div class="logo">
            🐾
        </div>

        <div class="logo-text">
            <h1>Nyanbot</h1>
            <p>miniapp</p>
        </div>

    </div>

    <div class="status">
        💎 online
    </div>

</div>

<div class="chat" id="chat">

    <div class="msg bot">
        ⚡ Подключение к серверу...
    </div>

</div>

<div class="bottom">

    <div class="actions">

        <button onclick="sendCmd('мяу')">
            🐾 Мяу
        </button>

        <button onclick="sendCmd('баланс')">
            💰 Баланс
        </button>

        <button onclick="startRocket()">
            🚀 Ракета
        </button>

    </div>

    <div class="input-wrap">

        <div class="input-row"
        id="rocketBetRow"
        style="display:none;">

            <input
            type="number"
            id="betInput"
            placeholder="Ставка..."
            value="100">

            <button
            class="send-btn"
            onclick="launchRocket()">
                🚀
            </button>

        </div>

        <div class="input-row">

            <input
            type="text"
            id="cmdInput"
            placeholder="Введите команду..."
            autofocus>

            <button
            class="send-btn"
            onclick="sendCmd()">
                ➜
            </button>

        </div>

    </div>

</div>

<script>

const tg =
window.Telegram.WebApp;

tg.ready();
tg.expand();

const chat =
document.getElementById('chat');

const input =
document.getElementById('cmdInput');

function add(text,type){

    const div =
    document.createElement('div');

    div.className =
    'msg ' + type;

    div.innerHTML = text;

    chat.appendChild(div);

    setTimeout(()=>{
        chat.scrollTop =
        chat.scrollHeight;
    },10);

    return div;
}

/* ПОДКЛЮЧЕНИЕ */

setTimeout(()=>{

    add(
    '🔐 Проверка соединения...',
    'bot');

},700);

setTimeout(()=>{

    add(
    '✅ Соединение установлено',
    'bot');

},1500);

setTimeout(()=>{

    add(
`👋 Добро пожаловать в Nyanbot

💬 Введите команду ниже`,
'bot');

},2200);

/* КОМАНДЫ */

function sendCmd(explicitCmd){

    const cmd =
    explicitCmd ||
    input.value.trim();

    if(!cmd) return;

    add(cmd,'user');

    input.value = '';

    setTimeout(()=>{

        add(
`🤖 Команда получена:
${cmd}`,
'bot');

    },400);
}

/* ROCKET */

let rocketMsg = null;

function startRocket(){

    const row =
    document.getElementById(
    'rocketBetRow'
    );

    row.style.display =
    row.style.display === 'flex'
    ? 'none'
    : 'flex';
}

function launchRocket(){

    const bet =
    parseInt(
    document.getElementById(
    'betInput'
    ).value
    ) || 100;

    document.getElementById(
    'rocketBetRow'
    ).style.display = 'none';

    rocketMsg =
    add(`
<div class="rocket-title">
🚀 РАКЕТА ЛЕТИТ
</div>

<div class="rocket-mult">
x1.00
</div>

<div>
💰 Ставка: ${bet}🪙
</div>

<div class="rocket-win">
💎 ${bet}🪙
</div>
`,
'rocket');

    const btn =
    document.createElement('button');

    btn.className =
    'cashout-btn';

    btn.innerText =
    '💰 ЗАБРАТЬ';

    btn.onclick =
    cashoutRocket;

    rocketMsg.appendChild(btn);
}

function cashoutRocket(){

    rocketMsg.innerHTML =
`
<div class="rocket-title">
✅ ВЫИГРЫШ ЗАБРАН
</div>

<div class="rocket-mult">
x1.47
</div>

<div class="rocket-win">
💰 147🪙
</div>
`;

    const skip =
    document.createElement('button');

    skip.className =
    'skip-btn';

    skip.innerText =
    '⏭ ПРОПУСТИТЬ';

    skip.onclick = ()=>{

        rocketMsg.innerHTML =
`
<div class="rocket-title">
⏭ ПРОПУЩЕНО
</div>

<div class="rocket-win">
💰 147🪙
</div>
`;
    };

    rocketMsg.appendChild(skip);
}

input.addEventListener(
'keypress',
e=>{

    if(e.key === 'Enter'){
        sendCmd();
    }
});

</script>

</body>
</html>
