<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Няшный Бот</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg: #0f0f1a;
            --surface: #1a1a2e;
            --accent: #e94560;
            --green: #0f9;
            --text: #eee;
            --text2: #aaa;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .topbar {
            background: var(--surface);
            padding: 12px 16px;
            text-align: center;
            font-size: 18px;
            font-weight: 600;
            border-bottom: 1px solid #222;
        }
        .chat {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .msg {
            max-width: 85%;
            padding: 10px 14px;
            border-radius: 16px;
            line-height: 1.4;
            animation: fadeIn 0.2s;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        .msg.user {
            background: #1e3a5f;
            align-self: flex-end;
            border-bottom-right-radius: 4px;
        }
        .msg.bot {
            background: var(--surface);
            align-self: flex-start;
            border-bottom-left-radius: 4px;
        }
        .bottom {
            background: var(--surface);
            padding: 8px;
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
            border-top: 1px solid #222;
        }
        .bottom button {
            background: #252545;
            color: var(--green);
            border: none;
            padding: 8px 12px;
            border-radius: 20px;
            font-size: 12px;
            cursor: pointer;
        }
        .input-row {
            background: var(--surface);
            padding: 8px 12px 12px;
            display: flex;
            gap: 8px;
        }
        .input-row input {
            flex: 1;
            padding: 12px 16px;
            border-radius: 25px;
            border: none;
            background: #252545;
            color: #fff;
            font-size: 15px;
        }
        .input-row button {
            width: 46px; height: 46px;
            border-radius: 50%;
            border: none;
            background: var(--accent);
            color: #fff;
            font-size: 18px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="topbar">🚀 Няшный Бот</div>
    <div class="chat" id="chat">
        <div class="msg bot">🤖 Привет! Я Няшный Бот.<br>Пиши команды 👇</div>
    </div>
    <div class="bottom">
        <button onclick="send('мяу')">🐾 мяу</button>
        <button onclick="send('баланс')">💗 баланс</button>
        <button onclick="send('ракета 100')">🚀 ракета</button>
        <button onclick="send('рул кра 50')">🎡 рул</button>
        <button onclick="send('топмяу')">🏆 топ</button>
        <button onclick="send('ты кто')">👤 профиль</button>
    </div>
    <div class="input-row">
        <input type="text" id="cmd" placeholder="Команда..." autofocus>
        <button onclick="send()">▶</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();
        
        const chat = document.getElementById('chat');
        const input = document.getElementById('cmd');
        
        function add(text, cls) {
            const div = document.createElement('div');
            div.className = 'msg ' + cls;
            div.textContent = text;
            chat.appendChild(div);
            chat.scrollTop = chat.scrollHeight;
        }
        
        function send(cmd) {
            const text = cmd || input.value.trim();
            if (!text) return;
            
            add(text, 'user');
            if (!cmd) input.value = '';
            
            // Отправляем в бота
            tg.sendData(text);
        }
        
        // Enter
        input.addEventListener('keypress', e => { if (e.key === 'Enter') send(); });
        
        // Ответ от бота (через MainButton эмулируем)
        tg.onEvent('mainButtonClicked', () => tg.sendData('menu'));
        tg.MainButton.setText('Закрыть').show();
        tg.MainButton.onClick(() => tg.close());
    </script>
</body>
</html>
